port: 7890
mixed-port: 7890
socks-port: 7891
redir-port: 7892
tproxy-port: 7893
routing-mark: 6666
allow-lan: true
bind-address: "*"
mode: rule
log-level: debug # 日志等级 silent/error/warning/info/debug
external-controller: 0.0.0.0:9090
secret: ''
external-ui: ui
external-ui-name: zashboard
external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages-cdn-fonts.zip"
geodata-mode: true
geodata-loader: memconservative
find-process-mode: strict
tcp-concurrent: true
disable-keep-alive: false #目前在android端强制为true
keep-alive-idle: 15
keep-alive-interval: 600
unified-delay: true
geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  asn: "https://cdn.jsdelivr.net/gh/P3TERX/GeoLite.mmdb@download/GeoLite2-ASN.mmdb"
geo-auto-update: true # 是否自动更新 geo
geo-update-interval: 24 # 更新间隔，单位：小时
# GeoSite 使用的匹配器实现，可用的实现：
# - succinct （默认，与规则集相同）
# - mph （来自 V2Ray，在 Xray 中也是“混合”）
geosite-matcher: succinct
global-ua: clash.meta
etag-support: true
experimental:
  ignore-resolve-fail: true
  sniff-tls-sni: true
  udp-fallback-match: true
  quic-go-disable-gso: true
profile:
  store-fake-ip: true
  store-selected: true
  tracing: true
ipv6: true
dns:
  cache-algorithm: arc
  enable: true
  prefer-h3: true
  listen: 0.0.0.0:7874
  ipv6: true
  use-hosts: true
  use-system-hosts: true
  respect-rules: false
  default-nameserver:
    - 114.114.114.114
    - 223.6.6.6
    - 223.5.5.5
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-range6: 2001:db9::1/64
  fake-ip-filter-mode: rule
  fake-ip-ttl: 1
  fake-ip-filter:
    - DOMAIN-SUFFIX,lan,real-ip
    - DOMAIN-SUFFIX,localdomain,real-ip
    - DOMAIN-SUFFIX,example,real-ip
    - DOMAIN-SUFFIX,invalid,real-ip
    - DOMAIN-SUFFIX,localhost,real-ip
    - DOMAIN-SUFFIX,test,real-ip
    - DOMAIN-SUFFIX,local,real-ip
    - DOMAIN-SUFFIX,home.arpa,real-ip
    - DOMAIN-SUFFIX,direct,real-ip
    - DOMAIN,network-test.debian.org,real-ip
    - DOMAIN,detectportal.firefox.com,real-ip
    - DOMAIN,resolver1.opendns.com,real-ip
    - DOMAIN-SUFFIX,pub.3gppnetwork.org,real-ip
    - DOMAIN,mesu.apple.com,real-ip
    - DOMAIN,swscan.apple.com,real-ip
    - DOMAIN,swquery.apple.com,real-ip
    - DOMAIN,swdownload.apple.com,real-ip
    - DOMAIN,swcdn.apple.com,real-ip
    - DOMAIN,swdist.apple.com,real-ip
    - DOMAIN-SUFFIX,nflxvideo.net,real-ip
    - DOMAIN-WILDCARD,*.mcdn.bilivideo.cn,real-ip
    - DOMAIN-SUFFIX,media.dssott.com,real-ip
    - DOMAIN-SUFFIX,pool.ntp.org,real-ip
    - DOMAIN-SUFFIX,msftconnecttest.com,real-ip
    - DOMAIN-SUFFIX,msftncsi.com,real-ip
    - DOMAIN-REGEX,(^|\.)stun[0-9]*[.-],real-ip
    - DOMAIN-SUFFIX,steamcontent.com,real-ip
    - DOMAIN-SUFFIX,wotgame.cn,real-ip
    - DOMAIN-SUFFIX,wggames.cn,real-ip
    - DOMAIN-SUFFIX,wowsgame.cn,real-ip
    - DOMAIN-SUFFIX,wargaming.net,real-ip
    - DOMAIN-SUFFIX,srv.nintendo.net,real-ip
    - DOMAIN-WILDCARD,*.n.n.srv.nintendo.net,real-ip
    - DOMAIN-SUFFIX,cdn.nintendo.net,real-ip
    - DOMAIN,lens.l.google.com,real-ip
    - DOMAIN,na.b.g-tun.com,real-ip
    - DOMAIN-SUFFIX,cmbchina.com,real-ip
    - DOMAIN-SUFFIX,cmbimg.com,real-ip
    - DOMAIN,local.adguard.org,real-ip
    - DOMAIN-SUFFIX,sandai.net,real-ip
    - DOMAIN-SUFFIX,n0808.com,real-ip
    - DOMAIN-SUFFIX,uu.163.com,real-ip
    - DOMAIN,ps.res.netease.com,real-ip
    - DOMAIN,v.recipes,real-ip
    - DOMAIN-SUFFIX,v.recipes,real-ip
    - RULE-SET,DNS,real-ip
    - RULE-SET,NTP-Service,real-ip
    - RULE-SET,WeChat,real-ip
    - RULE-SET,Alibaba,real-ip
    - RULE-SET,GameDownloadCN,real-ip
    - RULE-SET,ChinaMedia,real-ip
    - RULE-SET,Download,real-ip
    - GEOSITE,private,real-ip
    - GEOSITE,cn,real-ip
    - GEOSITE,category-games@cn,real-ip
    - GEOSITE,geolocation-!cn,fake-ip
    - MATCH,fake-ip
  nameserver:
    - https://223.6.6.6/dns-query#h3=true&skip-cert-verify=true
    - https://dns.alidns.com/dns-query#h3=true&skip-cert-verify=true
    - https://dns.pub/dns-query#skip-cert-verify=true
  fallback:
    - https://v.recipes/dns-ecs#h3=true&skip-cert-verify=true
    - https://v.recipes/dns-query#h3=true&skip-cert-verify=true
    - https://v.recipes/dns/doh.dns.sb/dns-query#h3=true&skip-cert-verify=true
  proxy-server-nameserver:
    - https://v.recipes/dns-ecs#h3=true&skip-cert-verify=true
    - https://v.recipes/dns-query#h3=true&skip-cert-verify=true
    - https://v.recipes/dns/doh.dns.sb/dns-query#h3=true&skip-cert-verify=true
    - https://223.6.6.6/dns-query#h3=true&skip-cert-verify=true
    - https://dns.alidns.com/dns-query#h3=true&skip-cert-verify=true
    - https://dns.pub/dns-query#skip-cert-verify=true
  proxy-server-nameserver-policy:
    "+.ndmdhs.com": 1.0.0.1
    "+.dutils.com": 114.114.114.114
    "+.hostbuf.com": 114.114.114.114
    "geosite:category-ads-all": rcode://success
    "+.tw,+.jp":
      - https://v.recipes/dns-ecs#h3=true&skip-cert-verify=true
      - https://v.recipes/dns-query#h3=true&skip-cert-verify=true
      - https://v.recipes/dns/doh.dns.sb/dns-query#h3=true&skip-cert-verify=true
    "geosite:category-games@cn":
      - https://223.6.6.6/dns-query#h3=true&skip-cert-verify=true
      - https://dns.alidns.com/dns-query#h3=true&skip-cert-verify=true
      - https://dns.pub/dns-query#skip-cert-verify=true
    "rule-set:DNS,NTP-Service,WeChat":
      - https://223.6.6.6/dns-query#h3=true&skip-cert-verify=true
      - https://dns.alidns.com/dns-query#h3=true&skip-cert-verify=true
      - https://dns.pub/dns-query#skip-cert-verify=true
    "rule-set:AppleMusic,AMusic":
      - https://v.recipes/dns-ecs#h3=true&skip-cert-verify=true
      - https://v.recipes/dns-query#h3=true&skip-cert-verify=true
      - https://v.recipes/dns/doh.dns.sb/dns-query#h3=true&skip-cert-verify=true
    "geosite:category-ai-!cn,geolocation-!cn":
      - https://v.recipes/dns-ecs#h3=true&skip-cert-verify=true
      - https://v.recipes/dns-query#h3=true&skip-cert-verify=true
      - https://v.recipes/dns/doh.dns.sb/dns-query#h3=true&skip-cert-verify=true
    "geosite:apple,cloudflare,wikimedia,tiktok,pikpak,github,speedtest,sony,meta,google,microsoft,yahoo":
      - https://v.recipes/dns-ecs#h3=true&skip-cert-verify=true
      - https://v.recipes/dns-query#h3=true&skip-cert-verify=true
      - https://v.recipes/dns/doh.dns.sb/dns-query#h3=true&skip-cert-verify=true
    "geosite:apple-cn,cn,private":
      - https://223.6.6.6/dns-query#h3=true&skip-cert-verify=true
      - https://dns.alidns.com/dns-query#h3=true&skip-cert-verify=true
      - https://dns.pub/dns-query#skip-cert-verify=true
    "geoip:google":
      - https://v.recipes/dns-ecs#h3=true&skip-cert-verify=true
      - https://v.recipes/dns-query#h3=true&skip-cert-verify=true
      - https://v.recipes/dns/doh.dns.sb/dns-query#h3=true&skip-cert-verify=true
    "geoip:cn":
      - https://223.6.6.6/dns-query#h3=true&skip-cert-verify=true
      - https://120.53.53.53/dns-query#h3=true&skip-cert-verify=true
  direct-nameserver:
    - https://223.6.6.6/dns-query#h3=true&skip-cert-verify=true
    - https://dns.alidns.com/dns-query#h3=true&skip-cert-verify=true
    - https://dns.pub/dns-query#skip-cert-verify=true
  direct-nameserver-follow-policy: true
  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - geolocation-!cn
    ipcidr:
      - ::/128
      - ::1/128
      - 2001::/32
      - 0.0.0.0/32
      - 100.64.0.0/10
      - 127.0.0.0/8
      - 240.0.0.0/4
      - 255.255.255.255/32
    domain:
      - "+.google.com"
      - "+.googleapis.com"
      - "+.googlevideo.com"
      - "+.gstatic.com"
      - "+.facebook.com"
      - "+.youtube.com"
      - "+.github.com"
      - "+.githubusercontent.com"
  nameserver-policy:
    "+.ndmdhs.com": 1.0.0.1
    "+.dutils.com": 114.114.114.114
    "+.hostbuf.com": 114.114.114.114
    "geosite:category-ads-all": rcode://success
    "+.tw,+.jp":
      - https://v.recipes/dns-ecs
      - https://v.recipes/dns-query
      - https://v.recipes/dns/doh.dns.sb/dns-query
    "geosite:category-games@cn":
      - https://223.6.6.6/dns-query
      - https://dns.alidns.com/dns-query
      - https://dns.pub/dns-query
    "rule-set:DNS,NTP-Service,WeChat":
